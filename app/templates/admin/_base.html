{% extends 'base.html' %}
{% block content %}
<div class="max-w-6xl mx-auto px-4 py-6 flex flex-col md:flex-row gap-6">
  <aside class="md:w-48 shrink-0">
    <nav class="bg-white border border-gray-200 rounded-lg overflow-hidden text-sm">
      <a href="{{ url_for('admin.dashboard') }}" class="block px-4 py-2.5 hover:bg-primary-50 {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint == 'admin.dashboard' }}">Dashboard</a>
      <a href="{{ url_for('admin.users_list') }}" class="block px-4 py-2.5 hover:bg-primary-50 border-t {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint and request.endpoint.startswith('admin.users') or request.endpoint in ['admin.approve_user','admin.edit_user','admin.new_user','admin.import_users'] }}">Users</a>
      <a href="{{ url_for('admin.payments') }}" class="block px-4 py-2.5 hover:bg-primary-50 border-t {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint == 'admin.payments' }}">Payments</a>
      <a href="{{ url_for('admin.batches') }}" class="block px-4 py-2.5 hover:bg-primary-50 border-t {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint == 'admin.batches' }}">Batches</a>
      <a href="{{ url_for('admin.announcements') }}" class="block px-4 py-2.5 hover:bg-primary-50 border-t {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint == 'admin.announcements' }}">Announcements</a>
      {% if current_user_obj.role == 'super_admin' %}
      <a href="{{ url_for('admin.admins') }}" class="block px-4 py-2.5 hover:bg-primary-50 border-t {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint == 'admin.admins' }}">Admins</a>
      {% endif %}
      <a href="{{ url_for('admin.activity_log') }}" class="block px-4 py-2.5 hover:bg-primary-50 border-t {{ 'bg-primary-50 text-primary-700 font-medium' if request.endpoint == 'admin.activity_log' }}">Activity Log</a>
    </nav>
  </aside>
  <div class="flex-1 min-w-0">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
