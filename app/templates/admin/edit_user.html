{% extends 'admin/_base.html' %}
{% block title %}Edit {{ member.name }} — Admin{% endblock %}
{% block admin_content %}
<a href="{{ url_for('admin.users_list') }}" class="text-sm text-primary-600 hover:underline">&larr; Back to users</a>
<h1 class="text-xl font-bold text-primary-800 mt-2 mb-4">Edit {{ member.name }}</h1>

<form method="post" class="bg-white border border-gray-200 rounded-lg p-5 space-y-4 max-w-md">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div>
    <label class="block text-sm font-medium mb-1">Full name</label>
    <input type="text" name="name" value="{{ member.name }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Mobile (personal)</label>
    <input type="text" name="mobile_personal" value="{{ member.profile.mobile_personal or '' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Current designation</label>
    <input type="text" name="current_designation" value="{{ member.profile.current_designation or '' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Location</label>
    <input type="text" name="location" value="{{ member.profile.location or '' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Batch</label>
    <select name="batch_id" class="w-full border border-gray-300 rounded-md px-3 py-2">
      <option value="">— None —</option>
      {% for b in batches %}<option value="{{ b.id }}" {% if member.emba_details.batch_id == b.id %}selected{% endif %}>{{ b.batch_name }}</option>{% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Passing year</label>
    <input type="number" name="passing_year" value="{{ member.emba_details.passing_year or '' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Class roll</label>
    <input type="text" name="class_roll" value="{{ member.emba_details.class_roll or '' }}" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white px-4 py-2 rounded-md font-medium">Save</button>
</form>
{% endblock %}
