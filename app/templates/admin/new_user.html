{% extends 'admin/_base.html' %}
{% block title %}Add member — Admin{% endblock %}
{% block admin_content %}
<a href="{{ url_for('admin.users_list') }}" class="text-sm text-primary-600 hover:underline">&larr; Back to users</a>
<h1 class="text-xl font-bold text-primary-800 mt-2 mb-4">Add member manually</h1>
<p class="text-sm text-gray-500 mb-4">For members who cannot self-register. Login credentials will be emailed (see Dev Inbox).</p>

<form method="post" class="bg-white border border-gray-200 rounded-lg p-5 space-y-4 max-w-md">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div>
    <label class="block text-sm font-medium mb-1">Full name</label>
    <input type="text" name="name" required class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Email</label>
    <input type="email" name="email" required class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Mobile</label>
    <input type="text" name="mobile" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Batch</label>
    <select name="batch_id" class="w-full border border-gray-300 rounded-md px-3 py-2">
      <option value="">— None —</option>
      {% for b in batches %}<option value="{{ b.id }}">{{ b.batch_name }}</option>{% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Passing year</label>
    <input type="number" name="passing_year" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <div>
    <label class="block text-sm font-medium mb-1">Class roll</label>
    <input type="text" name="class_roll" class="w-full border border-gray-300 rounded-md px-3 py-2">
  </div>
  <button type="submit" class="bg-primary-500 hover:bg-primary-600 text-white px-4 py-2 rounded-md font-medium">Create member</button>
</form>
{% endblock %}
