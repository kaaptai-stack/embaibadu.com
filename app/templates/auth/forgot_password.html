{% extends 'base.html' %}
{% block title %}Forgot password — {{ site_name }}{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="text-2xl font-bold text-primary-800 mb-6 text-center">Forgot your password?</h1>
  <form method="post" class="bg-white shadow-sm border border-gray-200 rounded-lg p-6 space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-400">
    </div>
    <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white rounded-md py-2 font-medium">Send reset link</button>
  </form>
</section>
{% endblock %}
