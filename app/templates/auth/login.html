{% extends 'base.html' %}
{% block title %}Login — {{ site_name }}{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="text-2xl font-bold text-primary-800 mb-6 text-center">Member Login</h1>
  <form method="post" class="bg-white shadow-sm border border-gray-200 rounded-lg p-6 space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required value="{{ email }}" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-400">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password" required class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-400">
    </div>
    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center gap-2"><input type="checkbox" name="remember"> Remember me</label>
      <a href="{{ url_for('auth.forgot_password') }}" class="text-primary-600 hover:underline">Forgot password?</a>
    </div>
    <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white rounded-md py-2 font-medium">Login</button>
  </form>
</section>
{% endblock %}
