{% extends 'base.html' %}
{% block title %}{{ site_name }} — Member Directory{% endblock %}
{% block content %}
<section class="max-w-3xl mx-auto px-4 py-20 text-center">
  <img src="{{ url_for('static', filename='img/logo.png') }}" alt="EMBA Member logo" class="h-28 w-auto mx-auto mb-10">
  <div class="flex items-center justify-center gap-4">
    <a href="{{ url_for('auth.login') }}" class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-md font-medium">Login</a>
  </div>
  <p class="text-xs text-gray-400 mt-8">Registration is by referral only. Ask an existing member for an invite link to join.</p>
</section>
{% endblock %}
