{% extends 'base.html' %}
{% block title %}Change password — {{ site_name }}{% endblock %}
{% block content %}
<section class="max-w-md mx-auto px-4 py-16">
  <h1 class="text-2xl font-bold text-primary-800 mb-6 text-center">Change password</h1>
  <form method="post" class="bg-white shadow-sm border border-gray-200 rounded-lg p-6 space-y-4">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
      <label class="block text-sm font-medium mb-1">Current password</label>
      <input type="password" name="current_password" required class="w-full border border-gray-300 rounded-md px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">New password</label>
      <input type="password" name="new_password" required class="w-full border border-gray-300 rounded-md px-3 py-2">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">Confirm new password</label>
      <input type="password" name="confirm_password" required class="w-full border border-gray-300 rounded-md px-3 py-2">
    </div>
    <button type="submit" class="w-full bg-primary-500 hover:bg-primary-600 text-white rounded-md py-2 font-medium">Update password</button>
  </form>
</section>
{% endblock %}
