{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="fixed top-0 inset-x-0 z-50 flex justify-center px-4 pt-2 pointer-events-none">
    <div class="w-full max-w-6xl space-y-2">
      {% for category, message in messages %}
        <div class="js-flash pointer-events-auto rounded-md px-4 py-2 text-sm shadow-lg border transition-opacity duration-500
          {% if category == 'error' %} bg-red-100 text-red-800 border-red-200
          {% elif category == 'success' %} bg-green-100 text-green-800 border-green-200
          {% else %} bg-blue-100 text-blue-800 border-blue-200 {% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  </div>
  <script>
    setTimeout(() => {
      document.querySelectorAll('.js-flash').forEach(el => {
        el.classList.add('opacity-0');
        setTimeout(() => el.remove(), 500);
      });
    }, 2000);
  </script>
  {% endif %}
{% endwith %}
